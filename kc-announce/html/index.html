<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KC Announce</title>

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Prevent selection highlight (NUI polish) -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =====================================================
     INPUT PANEL (ADMIN / LAW / MEDIC)
===================================================== -->
<div id="panel" class="hidden">

    <div class="panel-box">

        <div class="panel-header">
            TOWN ANNOUNCEMENT
            <span id="close">✕</span>
        </div>

        <textarea
            id="message"
            placeholder="Write your town announcement here..."
            maxlength="300"
            spellcheck="false"
        ></textarea>

        <button id="send">
            SEND NOTICE
        </button>

    </div>

</div>


<!-- =====================================================
     CINEMATIC ANNOUNCEMENT NOTIFICATION
===================================================== -->
<div id="announce-container" class="hidden">

    <!-- BADGE AUTO SWITCH -->
    <img id="badge" src="images/badge_admin.png" draggable="false">

    <div class="announce-frame">

        <!-- PARCHMENT BACKGROUND -->
        <img class="parchment" src="images/parchment.png" draggable="false">

        <!-- MESSAGE -->
        <div id="announce-text"></div>

    </div>

</div>


<!-- =====================================================
     AUDIO SYSTEM (OGG — GUARANTEED SOUND)
===================================================== -->

<audio id="sound-admin" preload="auto" src="sounds/admin.ogg"></audio>
<audio id="sound-law" preload="auto" src="sounds/law.ogg"></audio>
<audio id="sound-medic" preload="auto" src="sounds/medic.ogg"></audio>


<!-- =====================================================
     SCRIPT
===================================================== -->
<script src="script.js"></script>

</body>
</html>
